name: tests

# Runs the automated safety checks on every push and pull request to main.
# A green check next to a commit = all safety checks passed. A red X = something
# broke; do not rely on that version until it is fixed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
